name: Deploy Next.js Static Site to Pages

on:
  push:
    branches: ["master"] # Triggers deployment when you push to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-node: '20'
          cache: ${{ hashFiles('package-lock.json') && 'npm' || 'yarn' }}

      - name: Setup GitHub Pages Environment Configurations
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Install Project Dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci;
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile;
          else npm install;
          fi

      - name: Compile and Export Static HTML Production Bundle
        run: |
          if [ -f package-lock.json ]; then npm run build;
          elif [ -f yarn.lock ]; then yarn build;
          else npm run build;
          fi

      - name: Upload Static Production Assets Bundle
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js exports files here by default

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Production Assets Directly Live to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
